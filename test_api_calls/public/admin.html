<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Setup — GitHub OAuth</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #0d1117; color: #c9d1d9; }
    a { color: #58a6ff; }
    h1 { color: #f0f6fc; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin: 12px 0; }
    label { display: block; margin: 12px 0 4px; color: #8b949e; }
    input[type="text"], input[type="password"] { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 10px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: monospace; }
    input:focus { outline: none; border-color: #58a6ff; }
    button { background: #238636; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-family: monospace; border-radius: 6px; font-size: 14px; }
    button:hover { background: #2ea043; }
    .hint { font-size: 12px; color: #6e7681; margin-top: 4px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
    .badge-ok { background: #238636; color: #fff; }
    .badge-missing { background: #da3633; color: #fff; }
    .success { color: #3fb950; }
    .error { color: #f85149; }
    table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    td { padding: 4px 8px; border-bottom: 1px solid #21262d; }
    code { background: #161b22; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>⚙️ Admin Setup</h1>
  <p><a href="/">← Back to app</a></p>
  <div id="app">Loading…</div>

  <script>
    const $app = document.getElementById("app");

    async function init() {
      const config = await fetch("/api/config/status").then(r => r.json());
      render(config);
    }

    function render(config) {
      $app.innerHTML = `
        <div class="card">
          <h2>Current Status</h2>
          <p>Client ID: ${config.hasClientId
            ? `<span class="badge badge-ok">configured</span> <code>${config.clientIdPreview}</code>`
            : '<span class="badge badge-missing">missing</span>'}</p>
          <p>Client Secret: ${config.hasClientSecret
            ? '<span class="badge badge-ok">configured</span>'
            : '<span class="badge badge-missing">missing</span>'}</p>
        </div>

        <div class="card">
          <h2>Step 1 — Create a GitHub OAuth App</h2>
          <p>Go to: <a href="https://github.com/settings/applications/new" target="_blank">github.com/settings/applications/new</a></p>
          <p>Fill in:</p>
          <table>
            <tr><td>Application name</td><td><code>test-api-calls</code></td></tr>
            <tr><td>Homepage URL</td><td><code>http://localhost:3000</code></td></tr>
            <tr><td>Callback URL</td><td><code>http://localhost:3000/auth/github/callback</code></td></tr>
          </table>
          <p class="hint">Click "Register application", then generate a client secret on the next page.</p>
        </div>

        <div class="card">
          <h2>Step 2 — Paste Credentials</h2>
          <label for="clientId">Client ID</label>
          <input type="text" id="clientId" placeholder="Ov23li..." />
          <label for="clientSecret">Client Secret</label>
          <input type="password" id="clientSecret" placeholder="paste your client secret" />
          <p class="hint">Saved to <code>.env</code> on the server. Git-ignored.</p>
          <br/>
          <button id="save">Save & Apply</button>
          <p id="msg"></p>
        </div>
      `;

      document.getElementById("save").addEventListener("click", async () => {
        const clientId = document.getElementById("clientId").value.trim();
        const clientSecret = document.getElementById("clientSecret").value.trim();
        const msg = document.getElementById("msg");

        if (!clientId || !clientSecret) {
          msg.innerHTML = '<span class="error">Both fields are required.</span>';
          return;
        }

        msg.textContent = "Saving…";
        const res = await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ clientId, clientSecret }),
        }).then(r => r.json());

        if (res.ok) {
          msg.innerHTML = '<span class="success">✓ Saved! You can now go to the <a href="/">main app</a>.</span>';
          setTimeout(() => init(), 500);
        } else {
          msg.innerHTML = `<span class="error">Error: ${res.error}</span>`;
        }
      });
    }

    init();
  </script>
</body>
</html>
