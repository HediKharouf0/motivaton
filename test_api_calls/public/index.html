<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Test Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace; max-width: 960px; margin: 0 auto; padding: 20px; background: #0d1117; color: #c9d1d9; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { color: #f0f6fc; margin-bottom: 16px; }
    h2 { color: #f0f6fc; margin: 20px 0 8px; }
    h3 { color: #f0f6fc; margin: 14px 0 6px; font-size: 14px; }

    .btn { display: inline-block; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 14px; text-decoration: none; color: #fff; }
    .btn-primary { background: #238636; }
    .btn-primary:hover { background: #2ea043; }
    .btn-danger { background: #da3633; }
    .btn-danger:hover { background: #f85149; }
    .btn-secondary { background: #30363d; }
    .btn-secondary:hover { background: #484f58; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin: 12px 0; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid #30363d; margin: 16px 0 0; }
    .tab { padding: 10px 20px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; font-family: inherit; font-size: 14px; background: none; border-top: none; border-left: none; border-right: none; }
    .tab:hover { color: #c9d1d9; }
    .tab.active { color: #f0f6fc; border-bottom-color: #f78166; }
    .tab-content { display: none; padding-top: 16px; }
    .tab-content.active { display: block; }

    /* User bar */
    .user-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-bar img { border-radius: 50%; }
    .meta { color: #8b949e; font-size: 13px; }

    /* Form inputs */
    input[type="text"], input[type="password"] { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 10px; border-radius: 4px; width: 100%; font-family: monospace; box-sizing: border-box; }
    input:focus { outline: none; border-color: #58a6ff; }
    label { display: block; margin: 10px 0 4px; color: #8b949e; font-size: 13px; }

    select { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 12px; border-radius: 6px; font-family: inherit; font-size: 14px; min-width: 300px; }
    select:focus { outline: none; border-color: #58a6ff; }

    /* Commit list */
    .commit-row { display: grid; grid-template-columns: 80px 1fr 1fr auto; gap: 8px; align-items: start; padding: 10px 0; border-bottom: 1px solid #21262d; cursor: pointer; }
    .commit-row:hover { background: #161b22; }
    .commit-sha { color: #79c0ff; font-family: monospace; font-size: 13px; }
    .commit-msg { font-size: 14px; }
    .commit-msg .title { color: #f0f6fc; }
    .commit-msg .sub { color: #8b949e; font-size: 12px; margin-top: 2px; }
    .commit-stats { text-align: right; font-size: 12px; white-space: nowrap; }
    .commit-stats .add { color: #3fb950; }
    .commit-stats .del { color: #f85149; }
    .commit-stats .files { color: #8b949e; }
    .commit-stats .loading { color: #6e7681; }

    /* Commit detail */
    .detail { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 14px; margin-bottom: 12px; }
    .detail-header { display: flex; gap: 12px; align-items: start; margin-bottom: 12px; }
    .detail-header img { border-radius: 50%; margin-top: 3px; }
    .detail-body { font-size: 13px; }
    .detail-body pre { background: #161b22; padding: 10px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; margin: 8px 0; }
    .stat-bar { display: flex; gap: 16px; margin: 8px 0; }
    .file-item { padding: 4px 0; font-size: 12px; font-family: monospace; display: flex; gap: 8px; }
    .file-item .fname { color: #58a6ff; flex: 1; }
    .file-item .fstat { white-space: nowrap; }

    .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-added { background: #238636; color: #fff; }
    .badge-modified { background: #9e6a03; color: #fff; }
    .badge-removed { background: #da3633; color: #fff; }
    .badge-renamed { background: #1f6feb; color: #fff; }

    /* LeetCode specific */
    .lc-submission { padding: 10px 0; border-bottom: 1px solid #21262d; display: flex; gap: 12px; align-items: center; }
    .lc-title { color: #f0f6fc; flex: 1; }
    .lc-diff { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
    .lc-easy { background: #2cbb5d22; color: #2cbb5d; }
    .lc-medium { background: #ffc01e22; color: #ffc01e; }
    .lc-hard { background: #ef474322; color: #ef4743; }
    .lc-time { color: #8b949e; font-size: 12px; min-width: 100px; text-align: right; }
    .lc-stat-card { display: inline-block; text-align: center; padding: 12px 24px; border: 1px solid #30363d; border-radius: 8px; margin: 4px; }
    .lc-stat-card .num { font-size: 28px; font-weight: bold; color: #f0f6fc; }
    .lc-stat-card .lbl { font-size: 12px; color: #8b949e; }

    .hint { font-size: 12px; color: #6e7681; margin-top: 4px; }
    .success { color: #3fb950; }
    .error { color: #f85149; }
    .setup-msg { text-align: center; padding: 40px 20px; }
    .actions { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
  </style>
</head>
<body>
  <h1>API Test Dashboard</h1>
  <div id="app">Loading…</div>

  <script>
    const $app = document.getElementById("app");

    async function init() {
      const [config, me, lcStatus] = await Promise.all([
        fetch("/api/config/status").then(r => r.json()),
        fetch("/api/me").then(r => r.json()),
        fetch("/api/leetcode/status").then(r => r.json()),
      ]);

      // Build layout with tabs
      $app.innerHTML = `
        <div class="tabs">
          <button class="tab active" data-tab="github">GitHub</button>
          <button class="tab" data-tab="leetcode">LeetCode</button>
        </div>
        <div id="tab-github" class="tab-content active"></div>
        <div id="tab-leetcode" class="tab-content"></div>
      `;

      // Tab switching
      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
        });
      });

      // Render each tab
      renderGitHub(config, me);
      renderLeetCode(lcStatus);
    }

    // ======================== GITHUB TAB ========================
    function renderGitHub(config, me) {
      const $gh = document.getElementById("tab-github");

      if (!config.configured) {
        $gh.innerHTML = `
          <div class="setup-msg">
            <h2>⚙️ GitHub Not Configured</h2>
            <p class="meta">The admin needs to set up OAuth credentials. <a href="/admin.html">Admin setup →</a></p>
          </div>`;
        return;
      }

      if (!me.loggedIn) {
        $gh.innerHTML = `
          <div class="setup-msg">
            <h2>GitHub</h2>
            <p class="meta" style="margin-bottom:16px">Sign in with your GitHub account to view your commits.</p>
            <a href="/auth/github" class="btn btn-primary" style="font-size:16px; padding: 12px 32px;">Login with GitHub</a>
          </div>`;
        return;
      }

      $gh.innerHTML = `
        <div class="card">
          <div class="user-bar">
            <img src="${me.avatar}" width="40" height="40" />
            <div>
              <strong>${esc(me.name || me.username)}</strong>
              <span class="meta">@${esc(me.username)} · ${me.publicRepos} repos · ${me.followers} followers</span>
            </div>
            <div style="margin-left:auto">
              <button class="btn btn-danger btn-sm" onclick="location.href='/auth/logout'">Logout</button>
            </div>
          </div>
        </div>
        <div id="allCommits" style="margin-top:16px"></div>
      `;
      loadAllCommits();
    }

    async function loadAllCommits() {
      const div = document.getElementById("allCommits");
      div.innerHTML = "Loading commits…";

      try {
        const commits = await fetch("/api/commits/all/feed").then(r => r.json());
        if (commits.error) { div.innerHTML = `<p class="error">Error: ${commits.error}</p>`; return; }
        if (commits.length === 0) { div.innerHTML = `<p class="meta">No commits found.</p>`; return; }

        div.innerHTML = `<h2>Recent Commits <span class="meta">(${commits.length} total)</span></h2><div id="commitList" style="font-size:13px"></div>`;
        const list = document.getElementById("commitList");
        commits.forEach(c => {
          const dateStr = new Date(c.authorDate).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" });
          const lines = (c.additions || 0) + (c.deletions || 0);
          const row = document.createElement("div");
          row.style.cssText = "display:grid; grid-template-columns: 120px 180px 1fr 80px; gap:12px; align-items:center; padding:10px 0; border-bottom:1px solid #21262d;";
          row.innerHTML = `
            <span style="color:#8b949e">${dateStr}</span>
            <span style="color:#58a6ff"><strong>${esc(c.repoName)}</strong></span>
            <span style="color:#f0f6fc">${esc(c.authorLogin)}</span>
            <span style="color:#8b949e;text-align:right"><strong>${lines}</strong> lines</span>`;
          list.appendChild(row);
        });
      } catch (e) {
        div.innerHTML = `<p class="error">Failed to load: ${e.message}</p>`;
      }
    }

    let commitCache = {};
    async function loadRepos() {
      const repos = await fetch("/api/repos").then(r => r.json());
      const sel = document.getElementById("repoSelect");
      sel.innerHTML = '<option value="">— pick a repo —</option>' +
        repos.map(r => {
          const lang = r.language ? ` [${r.language}]` : "";
          const stars = r.stars ? ` ★${r.stars}` : "";
          return `<option value="${r.full_name}">${r.full_name}${r.private ? " 🔒" : ""}${lang}${stars}</option>`;
        }).join("");
      sel.addEventListener("change", () => { if (sel.value) loadCommits(sel.value); });
    }

    async function loadCommits(fullName) {
      const [owner, repo] = fullName.split("/");
      const div = document.getElementById("commits");
      div.innerHTML = "Loading commits…";
      commitCache = {};

      const commits = await fetch(`/api/commits/${owner}/${repo}`).then(r => r.json());
      if (commits.error) { div.innerHTML = `<p class="error">Error: ${commits.error}</p>`; return; }

      div.innerHTML = `<h2>Commits on ${esc(fullName)} <span class="meta">(${commits.length})</span></h2><div id="commitList"></div>`;
      const list = document.getElementById("commitList");
      commits.forEach(c => {
        const row = document.createElement("div");
        row.className = "commit-row";
        row.innerHTML = `
          <div class="commit-sha">${c.shaShort}</div>
          <div class="commit-msg">
            <div class="title">${esc(c.message.split("\n")[0])}</div>
            <div class="sub">${c.authorLogin ? `@${esc(c.authorLogin)}` : esc(c.authorName)} · ${relTime(c.authorDate)}</div>
          </div>
          <div class="commit-stats" id="stat-${c.sha}"><span class="loading">…</span></div>`;
        row.addEventListener("click", () => toggleDetail(owner, repo, c, row));
        list.appendChild(row);
      });
      fetchBatchStats(owner, repo, commits.map(c => c.sha));
    }

    async function fetchBatchStats(owner, repo, shas) {
      try {
        const statsMap = await fetch(`/api/commits/${owner}/${repo}/stats`, {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ shas }),
        }).then(r => r.json());
        for (const [sha, s] of Object.entries(statsMap)) {
          const el = document.getElementById("stat-" + sha);
          if (el && s.additions !== null) {
            el.innerHTML = `<span class="add">+${s.additions}</span> <span class="del">-${s.deletions}</span><br/><span class="files">${s.filesChanged} file${s.filesChanged !== 1 ? "s" : ""}</span>`;
          }
        }
      } catch (e) { console.error("Batch stats failed:", e); }
    }


    async function toggleDetail(owner, repo, commit, row) {
      const existing = row.nextElementSibling;
      if (existing && existing.classList.contains("detail")) { existing.remove(); return; }
      document.querySelectorAll(".detail").forEach(d => d.remove());

      const panel = document.createElement("div");
      panel.className = "detail";
      panel.innerHTML = "Loading…";
      row.after(panel);

      if (!commitCache[commit.sha]) {
        const data = await fetch(`/api/commit/${owner}/${repo}/${commit.sha}`).then(r => r.json());
        if (data.error) { panel.innerHTML = `<p class="error">${data.error}</p>`; return; }
        commitCache[commit.sha] = data;
      }
      const d = commitCache[commit.sha];
      const msgLines = d.message.split("\n");
      const body = msgLines.slice(1).join("\n").trim();
      panel.innerHTML = `
        <div class="detail-header">
          ${d.authorAvatar ? `<img src="${d.authorAvatar}" width="32" height="32" />` : ""}
          <div>
            <strong>${esc(msgLines[0])}</strong><br/>
            <span class="meta">${d.authorLogin ? `@${esc(d.authorLogin)}` : ""} ${esc(d.authorName)} &lt;${esc(d.authorEmail)}&gt;<br/>
            Committed ${new Date(d.committerDate).toLocaleString()}${d.committerName !== d.authorName ? ` by ${esc(d.committerName)}` : ""}</span>
          </div>
        </div>
        <div class="detail-body">
          ${body ? `<pre>${esc(body)}</pre>` : ""}
          <div class="stat-bar">
            <span class="add"><strong>+${d.stats.additions}</strong> additions</span>
            <span class="del"><strong>-${d.stats.deletions}</strong> deletions</span>
            <span class="files"><strong>${d.filesChanged}</strong> files changed</span>
          </div>
          <div style="margin-top:8px"><a href="${d.url}" target="_blank" class="btn btn-sm btn-primary">View on GitHub ↗</a> <span style="margin-left:8px;font-family:monospace;color:#6e7681">${d.sha}</span></div>
          <h3 style="margin-top:14px">Files Changed</h3>
          <div>${d.files.map(f => `<div class="file-item"><span class="badge badge-${f.status}">${f.status}</span><span class="fname">${esc(f.filename)}</span><span class="fstat"><span class="add">+${f.additions}</span> <span class="del">-${f.deletions}</span></span></div>`).join("")}</div>
        </div>`;
    }

    async function toggleDetailAll(commit, row) {
      const existing = row.nextElementSibling;
      if (existing && existing.classList.contains("detail")) { existing.remove(); return; }
      document.querySelectorAll(".detail").forEach(d => d.remove());

      const panel = document.createElement("div");
      panel.className = "detail";
      panel.innerHTML = "Loading…";
      row.after(panel);

      if (!commitCache[commit.sha]) {
        const [owner, repo] = commit.repoName.split("/");
        const data = await fetch(`/api/commit/${owner}/${repo}/${commit.sha}`).then(r => r.json());
        if (data.error) { panel.innerHTML = `<p class="error">${data.error}</p>`; return; }
        commitCache[commit.sha] = data;
      }
      const d = commitCache[commit.sha];
      const msgLines = d.message.split("\n");
      const body = msgLines.slice(1).join("\n").trim();
      panel.innerHTML = `
        <div class="detail-header">
          ${d.authorAvatar ? `<img src="${d.authorAvatar}" width="32" height="32" />` : ""}
          <div>
            <strong>${esc(msgLines[0])}</strong><br/>
            <span class="meta">${d.authorLogin ? `@${esc(d.authorLogin)}` : ""} ${esc(d.authorName)} &lt;${esc(d.authorEmail)}&gt;<br/>
            Committed ${new Date(d.committerDate).toLocaleString()}${d.committerName !== d.authorName ? ` by ${esc(d.committerName)}` : ""}</span>
          </div>
        </div>
        <div class="detail-body">
          ${body ? `<pre>${esc(body)}</pre>` : ""}
          <div class="stat-bar">
            <span class="add"><strong>+${d.stats.additions}</strong> additions</span>
            <span class="del"><strong>-${d.stats.deletions}</strong> deletions</span>
            <span class="files"><strong>${d.filesChanged}</strong> files changed</span>
          </div>
          <div style="margin-top:8px"><a href="${d.url}" target="_blank" class="btn btn-sm btn-primary">View on GitHub ↗</a> <span style="margin-left:8px;font-family:monospace;color:#6e7681">${d.sha}</span></div>
          <h3 style="margin-top:14px">Files Changed</h3>
          <div>${d.files.map(f => `<div class="file-item"><span class="badge badge-${f.status}">${f.status}</span><span class="fname">${esc(f.filename)}</span><span class="fstat"><span class="add">+${f.additions}</span> <span class="del">-${f.deletions}</span></span></div>`).join("")}</div>
        </div>`;
    }

    // ======================== LEETCODE TAB ========================
    function renderLeetCode(lcStatus) {
      const $lc = document.getElementById("tab-leetcode");

      if (!lcStatus.connected) {
        showLCConnect($lc);
      } else {
        showLCDashboard($lc, lcStatus);
      }
    }

    function showLCConnect($lc) {
      $lc.innerHTML = `
        <div class="card">
          <h2>Connect LeetCode</h2>
          <p class="meta" style="margin-bottom:8px">Enter your LeetCode username to see recent solved challenges.</p>

          <label for="lcUser">LeetCode Username <span class="error">*</span></label>
          <input type="text" id="lcUser" placeholder="e.g. leetcoder123" />

          <label for="lcSession">LEETCODE_SESSION cookie <span class="meta">(optional — for full history)</span></label>
          <input type="password" id="lcSession" placeholder="paste from DevTools → Application → Cookies" />
          <p class="hint">Log into leetcode.com → DevTools (F12) → Application → Cookies → copy LEETCODE_SESSION value</p>

          <label for="lcCsrf">csrftoken cookie <span class="meta">(optional — needed with session)</span></label>
          <input type="password" id="lcCsrf" placeholder="paste csrftoken value" />

          <div class="actions">
            <button class="btn btn-primary" id="lcConnect">Connect</button>
          </div>
          <p id="lcMsg"></p>
        </div>`;

      document.getElementById("lcConnect").addEventListener("click", async () => {
        const username = document.getElementById("lcUser").value.trim();
        const sessionCookie = document.getElementById("lcSession").value.trim();
        const csrfToken = document.getElementById("lcCsrf").value.trim();
        const msg = document.getElementById("lcMsg");

        if (!username) { msg.innerHTML = '<span class="error">Username is required.</span>'; return; }

        msg.textContent = "Connecting…";
        const res = await fetch("/api/leetcode/connect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, sessionCookie: sessionCookie || null, csrfToken: csrfToken || null }),
        }).then(r => r.json());

        if (res.ok) {
          msg.innerHTML = '<span class="success">✓ Connected!</span>';
          const status = await fetch("/api/leetcode/status").then(r => r.json());
          setTimeout(() => showLCDashboard(document.getElementById("tab-leetcode"), status), 300);
        } else {
          msg.innerHTML = `<span class="error">${res.error}</span>`;
        }
      });
    }

    function showLCDashboard($lc, lcStatus) {
      $lc.innerHTML = `
        <div class="card">
          <div class="user-bar">
            <div>
              <strong>${esc(lcStatus.username)}</strong>
              <span class="meta">LeetCode ${lcStatus.hasSession ? '· Full access' : '· Public data only'}</span>
            </div>
            <div style="margin-left:auto">
              <button class="btn btn-danger btn-sm" id="lcDisconnect">Disconnect</button>
            </div>
          </div>
        </div>
        <div id="lcStats"></div>
        <h2>Recent Accepted Submissions</h2>
        <div id="lcRecent">Loading…</div>
        ${lcStatus.hasSession ? '<h2>Full Submission History</h2><div id="lcHistory">Loading…</div>' : ''}
      `;

      document.getElementById("lcDisconnect").addEventListener("click", async () => {
        await fetch("/api/leetcode/disconnect", { method: "POST" });
        showLCConnect($lc);
      });

      loadLCStats(lcStatus.username);
      loadLCRecent(lcStatus.username);
      if (lcStatus.hasSession) loadLCHistory();
    }

    async function loadLCStats(username) {
      const div = document.getElementById("lcStats");
      try {
        const data = await fetch(`/api/leetcode/stats/${username}`).then(r => r.json());
        if (data.error) { div.innerHTML = `<p class="meta">Stats unavailable (may need session cookie)</p>`; return; }

        const solved = data.matchedUser?.submitStatsGlobal?.acSubmissionNum || [];
        const total = data.allQuestionsCount || [];
        const beats = data.matchedUser?.problemsSolvedBeatsStats || [];

        div.innerHTML = `<div style="margin:12px 0">${solved.map(s => {
          const t = total.find(q => q.difficulty === s.difficulty);
          const b = beats.find(q => q.difficulty === s.difficulty);
          const cls = s.difficulty === "Easy" ? "lc-easy" : s.difficulty === "Medium" ? "lc-medium" : s.difficulty === "Hard" ? "lc-hard" : "";
          return `<div class="lc-stat-card">
            <div class="num">${s.count}${t ? `<span class="meta" style="font-size:14px">/${t.count}</span>` : ""}</div>
            <div class="lbl"><span class="lc-diff ${cls}">${s.difficulty}</span></div>
            ${b ? `<div class="hint">${b.percentage.toFixed(1)}% beats</div>` : ""}
          </div>`;
        }).join("")}</div>`;
      } catch (e) {
        div.innerHTML = `<p class="meta">Could not load stats</p>`;
      }
    }

    async function loadLCRecent(username) {
      const div = document.getElementById("lcRecent");
      try {
        const submissions = await fetch(`/api/leetcode/recent/${username}`).then(r => r.json());
        if (submissions.error) { div.innerHTML = `<p class="error">${submissions.error}</p>`; return; }
        if (submissions.length === 0) { div.innerHTML = `<p class="meta">No recent submissions found.</p>`; return; }

        div.innerHTML = submissions.map(s => {
          const diffCls = s.difficulty === "Easy" ? "lc-easy" : s.difficulty === "Medium" ? "lc-medium" : s.difficulty === "Hard" ? "lc-hard" : "";
          const dateStr = new Date(s.date).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" });
          return `
          <div class="lc-submission">
            <span class="lc-diff ${diffCls}" style="min-width:60px;text-align:center">${s.difficulty || "?"}</span>
            <div class="lc-title">
              <a href="https://leetcode.com/problems/${s.titleSlug}/" target="_blank">${esc(s.title)}</a>
            </div>
            <div class="meta" style="min-width:140px">${dateStr}</div>
            <div class="lc-time">${relTime(s.date)}</div>
          </div>`;
        }).join("");
      } catch (e) {
        div.innerHTML = `<p class="error">Failed to load: ${e.message}</p>`;
      }
    }

    async function loadLCHistory() {
      const div = document.getElementById("lcHistory");
      if (!div) return;
      try {
        const data = await fetch("/api/leetcode/submissions?limit=30").then(r => r.json());
        if (data.error) { div.innerHTML = `<p class="error">${data.error}</p>`; return; }

        const subs = data.submissions || [];
        if (subs.length === 0) { div.innerHTML = `<p class="meta">No submissions found.</p>`; return; }

        div.innerHTML = subs.map(s => {
          const diffCls = s.difficulty === "Easy" ? "lc-easy" : s.difficulty === "Medium" ? "lc-medium" : s.difficulty === "Hard" ? "lc-hard" : "";
          const accepted = s.status === "Accepted" || s.status === "10";
          return `<div class="lc-submission">
            <span class="lc-diff ${diffCls}" style="min-width:60px;text-align:center">${s.difficulty || "?"}</span>
            <div class="lc-title" style="color:${accepted ? '#3fb950' : '#f85149'}">${esc(s.title)}</div>
            <span class="meta">${s.language}</span>
            <span class="meta">${accepted ? "✓ AC" : s.status}</span>
            <div class="lc-time">${relTime(s.date)}</div>
          </div>`;
        }).join("");

        if (data.hasNext) {
          div.innerHTML += `<p class="meta" style="margin-top:12px">More submissions available (paginated)</p>`;
        }
      } catch (e) {
        div.innerHTML = `<p class="error">Failed to load: ${e.message}</p>`;
      }
    }

    // ======================== UTILS ========================
    function esc(str) {
      if (!str) return "";
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function relTime(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days < 30) return `${days}d ago`;
      return new Date(dateStr).toLocaleDateString();
    }

    init();
  </script>
</body>
</html>
